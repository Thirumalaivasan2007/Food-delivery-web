<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders | Feastify</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { primary: '#ff5a00' } } } }
    </script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
</head>
<body class="bg-gray-50 font-sans min-h-screen">
    <!-- Navbar -->
    <nav class="bg-white border-b border-gray-100 py-4 px-6 fixed top-0 w-full z-50 flex justify-between items-center shadow-sm">
        <div class="flex items-center gap-8">
            <h1 class="text-2xl font-black text-primary italic tracking-tighter">Feastify</h1>
            <div class="hidden md:flex gap-6 font-bold text-gray-500 text-sm">
                <a href="/menu.html" class="hover:text-primary transition-colors">Menu</a>
                <a href="/my-orders.html" class="text-primary tracking-tight">Order Status</a>
            </div>
        </div>
        <button onclick="window.location.href='/menu.html'" class="flex items-center gap-2 text-sm font-black text-gray-500 hover:text-gray-900 transition-all">
            <i class="ri-arrow-left-s-line"></i> Back to Menu
        </button>
    </nav>

    <!-- Main Content -->
    <main class="max-w-4xl mx-auto pt-24 px-6 pb-20">
        <header class="mb-12">
            <h2 class="text-4xl font-black text-gray-900 tracking-tight">My Orders</h2>
            <p class="text-gray-500 font-medium">Track your delicious journey in real-time</p>
        </header>

        <!-- Orders List -->
        <div id="orders-list" class="space-y-6">
            <!-- Loading State -->
            <div class="animate-pulse space-y-4">
                <div class="h-40 bg-gray-200 rounded-3xl"></div>
                <div class="h-40 bg-gray-200 rounded-3xl"></div>
            </div>
        </div>

        <div id="empty-state" class="hidden text-center py-20">
            <div class="w-24 h-24 bg-gray-100 text-gray-400 rounded-full flex items-center justify-center mx-auto mb-6 text-4xl">
                <i class="ri-restaurant-2-line"></i>
            </div>
            <h3 class="text-xl font-black text-gray-900 mb-2">No orders found</h3>
            <p class="text-gray-500 mb-8 font-medium">Hungry? Order your favorite meal now!</p>
            <a href="/menu.html" class="inline-block bg-primary text-white px-8 py-4 rounded-2xl font-black shadow-lg shadow-primary/20 hover:bg-orange-600 transition-all">
                Browse Menu
            </a>
        </div>
    </main>
    <script src="/script.js"></script>
    <script>
        const user = JSON.parse(localStorage.getItem('user'));
        if (!user) window.location.href = '/';

        async function fetchMyOrders() {
            try {
                const user = JSON.parse(localStorage.getItem('user'));
                const userEmail = (user && user.email) || localStorage.getItem('userEmail');
                
                if (!userEmail) {
                    window.location.href = '/index.html';
                    return;
                }
                
                const res = await fetch(`${API_BASE_URL}/api/my-orders?email=${encodeURIComponent(userEmail)}`);
                const orders = await res.json();
                renderOrders(orders);
            } catch (err) {
                console.error("Error fetching orders:", err);
            }
        }

        function getStatusColor(status) {
            switch(status) {
                case 'Pending': return 'bg-amber-50 text-amber-600 ring-amber-100';
                case 'Preparing': return 'bg-blue-50 text-blue-600 ring-blue-100';
                case 'Out for Delivery': return 'bg-indigo-50 text-indigo-600 ring-indigo-100';
                case 'Delivered': return 'bg-green-50 text-green-600 ring-green-100';
                case 'Cancelled': return 'bg-red-50 text-red-600 ring-red-100';
                default: return 'bg-gray-50 text-gray-600 ring-gray-100';
            }
        }

        function renderOrders(orders) {
            const list = document.getElementById('orders-list');
            const empty = document.getElementById('empty-state');
            
            if (orders.length === 0) {
                list.classList.add('hidden');
                empty.classList.remove('hidden');
                return;
            }

            list.innerHTML = '';
            orders.forEach(order => {
                const date = App.formatDate(order.timestamp);

                const statusColor = getStatusColor(order.orderStatus);

                const card = document.createElement('div');
                card.className = "bg-white p-8 rounded-[2rem] border border-gray-100 shadow-sm hover:shadow-xl transition-all duration-300";
                
                card.innerHTML = `
                    <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-6 pb-6 border-b border-gray-50">
                        <div>
                            <div class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1">Order #${order._id.slice(-6).toUpperCase()}</div>
                            <div class="text-sm font-bold text-gray-500">${date}</div>
                        </div>
                        <div class="flex items-center gap-3">
                            <div class="px-4 py-2 rounded-full text-xs font-black uppercase ring-1 ${statusColor}">
                                ${order.orderStatus || 'Pending'}
                            </div>
                            ${(order.orderStatus !== 'Cancelled' && order.orderStatus !== 'Delivered' && order.orderStatus !== 'Out for Delivery') ? `
                                <button onclick="cancelOrder('${order._id}')" class="text-[10px] font-black text-red-500 hover:text-red-700 uppercase tracking-widest border border-red-200 px-3 py-1 rounded-lg">Cancel</button>
                            ` : ''}
                        </div>
                    </div>
                    
                    <div class="space-y-4 mb-6">
                        ${order.cartItems.map(item => `
                            <div class="flex justify-between items-center">
                                <span class="text-sm font-bold text-gray-700">${item.quantity || 1}x ${item.name}</span>
                                <span class="text-sm font-black text-gray-900 tracking-tight">₹${item.price.toFixed(2)}</span>
                            </div>
                        `).join('')}
                    </div>

                    <div class="flex justify-between items-center pt-6 border-t border-gray-50">
                        <span class="text-sm font-black text-gray-400 uppercase tracking-widest text-xs">Total Amount</span>
                        <span class="text-2xl font-black text-primary italic">₹${(order.totalAmount || 0).toFixed(2)}</span>
                    </div>
                `;
                list.appendChild(card);
            });
        }

        async function cancelOrder(id) {
            if (!confirm('Are you sure you want to cancel this order?')) return;
            const res = await fetch(`${API_BASE_URL}/api/orders/${id}/customer-cancel`, { method: 'POST' });
            if (res.ok) {
                alert('Order cancelled. The restaurant has been notified.');
                fetchMyOrders();
            }
        }

        fetchMyOrders();
        // Polling for live status updates
        setInterval(fetchMyOrders, 5000);
    </script>
</body>
</html>

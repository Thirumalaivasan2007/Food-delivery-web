<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Success | Feastify</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { primary: '#ff5a00' } } } }
    </script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen p-4">
    <div class="max-w-md w-full bg-white rounded-3xl shadow-2xl p-8 text-center">
        <div class="w-24 h-24 bg-green-100 text-green-500 rounded-full flex items-center justify-center mx-auto mb-6 text-5xl">
            <i class="ri-checkbox-circle-fill"></i>
        </div>
        
        <h1 class="text-3xl font-black text-gray-900 mb-2">Order Confirmed!</h1>
        <p class="text-gray-500 mb-8">Thank you for ordering. Your food is being prepared with love.</p>
        
        <div class="bg-gray-50 rounded-2xl p-6 mb-8 text-left border border-gray-100">
            <div class="flex justify-between items-center mb-4">
                <span class="text-xs font-bold text-gray-400 uppercase tracking-widest">Order ID</span>
                <span id="order-id" class="text-sm font-black text-gray-900 uppercase">#829102</span>
            </div>
            <div class="flex items-center gap-4 text-sm font-bold text-gray-700">
                <div class="w-10 h-10 bg-orange-100 text-primary rounded-xl flex items-center justify-center text-xl">
                    <i class="ri-time-line"></i>
                </div>
                <div>
                    <div>Estimated Delivery</div>
                    <div class="text-xs text-gray-400">25 - 35 mins</div>
                </div>
            </div>
        </div>

        <button onclick="window.location.href='/menu.html'" class="w-full bg-primary text-white font-black py-4 rounded-2xl shadow-lg shadow-primary/20 hover:bg-orange-600 transition-all">
            Back to Menu
        </button>
        
        <p class="mt-8 text-xs font-bold text-gray-300 uppercase tracking-[0.3em]">CraveBites 2024</p>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');
        if (id) {
            document.getElementById('order-id').innerText = `#${id.slice(-6).toUpperCase()}`;
        }
    </script>
</body>
</html>

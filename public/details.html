<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Details | Feastify</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { primary: '#ff5a00' } } } }
    </script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        .glass-nav { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-gray-50 font-sans min-h-screen pb-24">
    <nav class="glass-nav sticky top-0 z-50 border-b border-gray-100 p-4">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <button onclick="window.location.href='/menu.html'" class="text-gray-600 hover:text-primary transition-colors flex items-center gap-2 font-bold">
                <i class="ri-arrow-left-s-line text-2xl"></i>
                <span>Menu</span>
            </button>
            <div id="cart-indicator" onclick="window.location.href='/cart.html'" class="bg-gray-900 text-white px-4 py-2 rounded-full flex items-center gap-2 cursor-pointer hover:bg-black transition-all">
                <i class="ri-shopping-cart-2-line"></i>
                <span id="cart-count">0</span>
            </div>
        </div>
    </nav>

    <main id="details-view" class="max-w-4xl mx-auto p-6 animate-pulse">
        <div class="flex flex-col md:flex-row gap-8">
            <div class="md:w-1/2">
                <div class="bg-gray-200 rounded-3xl h-[400px] w-full" id="detail-img"></div>
            </div>
            <div class="md:w-1/2 space-y-6">
                <div>
                    <span id="detail-category" class="bg-primary/10 text-primary px-3 py-1 rounded-full text-xs font-black uppercase tracking-widest">Category</span>
                    <h1 id="detail-title" class="text-4xl font-black text-gray-900 mt-4 leading-tight">Loading...</h1>
                </div>
                <div class="flex items-center gap-4">
                    <span id="detail-price" class="text-3xl font-black text-primary">₹0.00</span>
                    <div class="w-[2px] h-6 bg-gray-200"></div>
                    <div class="flex items-center text-yellow-500 gap-1 font-bold">
                        <i class="ri-star-fill"></i> 4.8 <span class="text-gray-400 text-xs font-medium">(250+ Reviews)</span>
                    </div>
                </div>
                <p id="detail-desc" class="text-gray-500 leading-relaxed text-lg">Fetching savory details for you...</p>
                <div class="grid grid-cols-2 gap-4 pt-6 border-t border-gray-100">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-green-50 text-green-500 rounded-xl flex items-center justify-center"><i class="ri-timer-line"></i></div>
                        <div id="detail-preptime" class="text-xs font-bold text-gray-500">25-30 Mins</div>
                    </div>
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-blue-50 text-blue-500 rounded-xl flex items-center justify-center"><i class="ri-leaf-line"></i></div>
                        <div id="detail-tag" class="text-xs font-bold text-gray-500">Fresh Items</div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Floating Actions -->
    <div class="fixed bottom-0 left-0 right-0 p-6 glass-nav border-t border-gray-100">
        <div class="max-w-4xl mx-auto grid grid-cols-2 gap-4">
            <button onclick="addToCartDetailed()" class="bg-gray-100 text-gray-900 font-bold py-4 rounded-2xl hover:bg-gray-200 transition-all flex items-center justify-center gap-2">
                <i class="ri-shopping-bag-line"></i> Add to Cart
            </button>
            <button onclick="buyNow()" class="bg-primary text-white font-bold py-4 rounded-2xl shadow-lg shadow-primary/20 hover:bg-orange-600 transition-all active:scale-[0.98]">
                Buy Now
            </button>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed top-24 left-1/2 -translate-x-1/2 bg-gray-900 text-white px-6 py-3 rounded-full shadow-2xl opacity-0 transition-opacity pointer-events-none flex items-center gap-3 z-[60]">
        <i class="ri-checkbox-circle-fill text-green-400"></i>
        <span class="font-bold text-sm">Added to cart successfully</span>
    </div>

    <script src="/script.js"></script>
    <script>
        App.checkAuth();
        let currentFood = null;

        document.addEventListener('DOMContentLoaded', async () => {
            const params = new URLSearchParams(window.location.search);
            const foodId = params.get('id');

            if (!foodId) {
                window.location.href = '/menu.html';
                return;
            }

            try {
                const res = await fetch(`/api/foods/${foodId}`);
                if (!res.ok) throw new Error('Not found');
                currentFood = await res.json();
            } catch (err) {
                console.warn('Food not found in DB, checking mockup data');
                const mockFoods = [
                    { _id: '1', name: 'Premium Sushi', price: 28.00, description: 'Fresh seasonal fish platter. Expertly sliced salmon, tuna, and yellowtail served with house-made soy and wasabi.', imageUrl: 'https://images.unsplash.com/photo-1579871494447-9811cf80d66c?auto=format&fit=crop&w=400', category: 'Japanese' },
                    { _id: '2', name: 'Margherita Pizza', price: 16.50, description: 'Authentic Neapolitan crust topped with vine-ripened tomatoes, fresh mozzarella, and aromatic basil.', imageUrl: 'https://images.unsplash.com/photo-1513104890138-7c749659a591?auto=format&fit=crop&w=400', category: 'Italian' },
                    { _id: '3', name: 'Classic Burger', price: 12.99, description: 'Juicy grass-fed beef patty with melted cheddar, crisp lettuce, and our secret burger sauce on a brioche bun.', imageUrl: 'https://images.unsplash.com/photo-1568901346375-23c9450c58cd?auto=format&fit=crop&w=400', category: 'American' }
                ];
                currentFood = mockFoods.find(f => f._id === foodId);
                
                if (!currentFood) {
                    alert('Food item not found');
                    window.location.href = '/menu.html';
                    return;
                }
            }

            // Populate DOM
            document.getElementById('detail-title').innerText = currentFood.name;
            document.getElementById('detail-desc').innerText = currentFood.description;
            document.getElementById('detail-price').innerText = `₹${currentFood.price.toFixed(2)}`;
            document.getElementById('detail-category').innerText = currentFood.category || 'Specialty';
            document.getElementById('detail-preptime').innerText = currentFood.prepTime || '25-30 Mins';
            document.getElementById('detail-tag').innerText = currentFood.tag || 'Fresh Items';
            document.getElementById('detail-img').innerHTML = `<img src="${currentFood.imageUrl}" class="w-full h-full object-cover rounded-3xl" alt="${currentFood.name}">`;
            
            document.getElementById('details-view').classList.remove('animate-pulse');
            updateCartCount();
        });

        function updateCartCount() {
            document.getElementById('cart-count').innerText = App.Cart.get().length;
        }

        function showToast() {
            const toast = document.getElementById('toast');
            toast.style.opacity = '1';
            setTimeout(() => toast.style.opacity = '0', 2000);
        }

        function addToCartDetailed() {
            if (!currentFood) return;
            App.Cart.add({
                id: currentFood._id,
                name: currentFood.name,
                price: currentFood.price,
                img: currentFood.imageUrl
            });
            updateCartCount();
            showToast();
        }

        function buyNow() {
            if (!currentFood) return;
            // Clear or just add? Usually buy now means checkout THIS item
            // For now, consistent with requirements: add to cart and redirect
            App.Cart.add({
                id: currentFood._id,
                name: currentFood.name,
                price: currentFood.price,
                img: currentFood.imageUrl
            });
            window.location.href = '/checkout.html';
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feastify | Premium Food Delivery</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
    <style>
        .role-selection {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        .role-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            padding: 2rem;
            border-radius: var(--radius-md);
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
        }
        .role-card:hover, .role-card.active {
            border-color: var(--primary-color);
            background: rgba(255, 90, 0, 0.05);
            transform: translateY(-5px);
        }
        .role-card i {
            font-size: 2.5rem;
            color: var(--primary-color);
            display: block;
            margin-bottom: 1rem;
        }
        .auth-form {
            display: none;
        }
        .auth-form.active {
            display: block;
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div id="app">
        <section id="login-page" class="page active">
            <div class="login-container">
                <div class="brand">
                    <h1>Feastify</h1>
                    <p>Experience the art of flavor.</p>
                </div>

                <div id="role-step">
                    <h3 style="text-align: center; margin-bottom: 1.5rem; color: var(--text-secondary);">Choose your role</h3>
                    <div class="role-selection">
                        <div class="role-card" onclick="selectRole('customer')">
                            <i class="ri-user-smile-line"></i>
                            <span>Customer</span>
                        </div>
                        <div class="role-card" onclick="selectRole('admin')">
                            <i class="ri-admin-line"></i>
                            <span>Admin</span>
                        </div>
                    </div>
                </div>

                <div id="auth-step" class="auth-form">
                    <button class="btn btn-text" style="margin-bottom: 1rem; padding: 0;" onclick="goBackToRoles()">
                        <i class="ri-arrow-left-line"></i> Back
                    </button>
                    
                    <div id="login-container">
                        <h3 id="form-title" style="margin-bottom: 1.5rem;">Welcome to Feastify</h3>
                        <form id="login-form">
                            <input type="hidden" id="selected-role" value="customer">
                            <div class="input-group">
                                <label for="email">Email Address</label>
                                <input type="email" id="email" required placeholder="you@example.com">
                            </div>
                            <div class="input-group">
                                <label for="password">Password</label>
                                <input type="password" id="password" required placeholder="••••••••">
                            </div>
                            <button type="submit" id="auth-submit-btn" class="btn btn-primary btn-block">Sign In</button>
                        </form>
                        <p style="text-align: center; margin-top: 1.5rem; color: var(--text-secondary); font-size: 0.9rem;">
                            Don't have an account? <a href="#" onclick="toggleAuth('register')" style="color: var(--primary-color); text-decoration: none;">Register</a>
                        </p>
                    </div>

                    <div id="register-container" style="display: none;">
                        <h3 style="margin-bottom: 1.5rem;">Create Account</h3>
                        <form id="register-form">
                            <div class="input-group">
                                <label for="reg-name">Full Name</label>
                                <input type="text" id="reg-name" required placeholder="John Doe">
                            </div>
                            <div class="input-group">
                                <label for="reg-email">Email Address</label>
                                <input type="email" id="reg-email" required placeholder="you@example.com">
                            </div>
                            <div class="input-group">
                                <label for="reg-password">Password</label>
                                <input type="password" id="reg-password" required placeholder="••••••••">
                            </div>
                            <button type="submit" class="btn btn-primary btn-block">Register Only</button>
                        </form>
                        <p style="text-align: center; margin-top: 1.5rem; color: var(--text-secondary); font-size: 0.9rem;">
                            Already have an account? <a href="#" onclick="toggleAuth('login')" style="color: var(--primary-color); text-decoration: none;">Login</a>
                        </p>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <script>
        function selectRole(role) {
            document.getElementById('role-step').style.display = 'none';
            document.getElementById('auth-step').classList.add('active');
            document.getElementById('selected-role').value = role;
            document.getElementById('form-title').innerText = `Welcome to Feastify (${role.charAt(0).toUpperCase() + role.slice(1)})`;
            
            if(role === 'admin') {
                document.getElementById('auth-submit-btn').innerText = 'Admin Portal Access';
            } else {
                document.getElementById('auth-submit-btn').innerText = 'Sign In';
            }
            toggleRole(role); // Call the new toggleRole function
        }

        function toggleRole(role) {
            currentRole = role;
            // Assuming role-btn classes are on role-card for visual feedback if needed elsewhere
            document.querySelectorAll('.role-card').forEach(btn => btn.classList.remove('active'));
            // Add active class to the selected role card if needed
            // document.querySelector(`.role-card[onclick*="${role}"]`).classList.add('active');
            
            const authDiv = document.getElementById('auth-step'); // Changed from auth-section to auth-step
            authDiv.style.display = 'block';
            
            // UI Logic: Hide Register for Admin
            const toggleLink = document.getElementById('auth-toggle-link');
            const toggleText = document.getElementById('auth-toggle-text');
            if (role === 'admin') {
                toggleAuth('login'); // Ensure login form is shown for admin
                toggleLink.style.display = 'none'; // Hide the "Register" link
                toggleText.style.display = 'none';
            } else {
                toggleLink.style.display = 'block'; // Show for customers
                toggleText.style.display = 'inline';
            }
        }

        function goBackToRoles() {
            document.getElementById('auth-step').classList.remove('active');
            document.getElementById('role-step').style.display = 'block';
            toggleAuth('login'); // Reset to login view
            document.getElementById('auth-toggle-link').style.display = 'block'; // Ensure link is visible when going back
            document.getElementById('auth-toggle-text').style.display = 'inline';
        }

        function toggleAuth(mode) {
            const login = document.getElementById('login-container');
            const register = document.getElementById('register-container');
            const toggleText = document.getElementById('auth-toggle-text');
            const toggleLink = document.getElementById('auth-toggle-link');

            if (mode === 'register') {
                login.style.display = 'none';
                register.style.display = 'block';
                toggleText.innerText = 'Already have an account? ';
                toggleLink.innerText = 'Login';
                toggleLink.setAttribute('onclick', "toggleAuth('login')");
            } else {
                login.style.display = 'block';
                register.style.display = 'none';
                toggleText.innerText = "Don't have an account? ";
                toggleLink.innerText = 'Register';
                toggleLink.setAttribute('onclick', "toggleAuth('register')");
            }
        }

        // Registration form handler
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault(); // Critical: Prevent page reload
            console.log("Registration form submitted");

            const name = document.getElementById('reg-name').value;
            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-password').value;

            console.log("Attempting to register:", { name, email });

            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });

                const data = await response.json();
                console.log("Registration API response:", data);

                if (data.success) {
                    alert('Registration successful! Redirecting...');
                    localStorage.setItem('user', JSON.stringify({ email, name, role: 'customer', userId: data.userId }));
                    localStorage.setItem('userEmail', email);
                    window.location.href = data.redirect;
                } else {
                    console.error("Registration failed:", data.error || data.message);
                    alert('Registration failed: ' + (data.error || data.message || 'Unknown error'));
                }
            } catch (error) {
                console.error('Registration fetch error:', error);
                alert('Connection error occurred during registration. Please check the console.');
            }
        });

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const role = document.getElementById('selected-role').value;

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();
                if (data.success) {
                    if (data.role !== role) {
                        alert(`Unauthorized. This account is registered as a ${data.role}.`);
                        return;
                    }
                    localStorage.setItem('user', JSON.stringify({ email: email, name: data.name, role: data.role, userId: data.userId }));
                    localStorage.setItem('userEmail', email);
                    window.location.href = data.redirect;
                } else {
                    // MOCKUP FALLBACK FOR PREVIEW
                    console.warn('API error, using demo mode fallback.');
                    if (email === 'test@example.com' && password === '123456') {
                       localStorage.setItem('user', JSON.stringify({ userId: 'demo-id', role: role }));
                       window.location.href = (role === 'admin') ? '/admin.html' : '/menu.html';
                    } else {
                       alert(data.message || 'Login failed. Try test@example.com / 123456 for demo.');
                    }
                }
            } catch (error) {
                console.error('Login error:', error);
                if (email === 'test@example.com' && password === '123456') {
                    localStorage.setItem('user', JSON.stringify({ userId: 'demo-id', role: role }));
                    window.location.href = (role === 'admin') ? '/admin.html' : '/menu.html';
                } else {
                    alert('Connection error. Try test@example.com / 123456 for demo.');
                }
            }
        });
    </script>
</body>
</html>

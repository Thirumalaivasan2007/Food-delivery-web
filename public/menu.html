<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feastify | Explore Our Menu</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
    <style>
        .page { position: relative; opacity: 1; visibility: visible; transform: none; padding: 2rem; }
        .cart-indicator {
            position: relative;
            cursor: pointer;
        }
        .cart-count {
            position: absolute;
            top: -10px;
            right: -10px;
            background: var(--primary-color);
            color: white;
            font-size: 0.75rem;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div id="app">
        <header>
            <div class="logo" style="font-size: 2rem; font-weight: 900; letter-spacing: -1px; font-style: italic;">Feastify</div>
            <div style="display: flex; align-items: center; gap: 2rem;">
                <div class="cart-indicator" onclick="window.location.href='/cart.html'">
                    <i class="ri-shopping-cart-2-line" style="font-size: 1.5rem;"></i>
                    <span class="cart-count" id="cart-count">0</span>
                </div>
                <a href="/my-orders.html" class="btn btn-text" style="color: var(--primary-color); font-weight: 700;">Track Orders</a>
                <button onclick="logout()" class="btn btn-text">Logout</button>
            </div>
        </header>

        <main>
            <!-- Modern Search Bar -->
            <div style="max-width: 600px; margin: 0 auto 2.5rem; position: relative;">
                <div style="background: white; border: 1px solid var(--border-color); padding: 0.75rem 1.5rem; border-radius: 100px; display: flex; align-items: center; gap: 1rem; box-shadow: 0 4px 20px rgba(0,0,0,0.05); transition: all 0.3s ease; border: 1px solid #eee;" id="search-container">
                    <i class="ri-search-line" style="color: var(--primary-color); font-size: 1.2rem;"></i>
                    <input type="text" id="menu-search" oninput="filterBySearch()" placeholder="Search for Biryani, Pizza, Noodles..." style="border: none; outline: none; flex: 1; font-family: inherit; font-size: 1rem; font-weight: 500; color: #111827; background: transparent;">
                </div>
            </div>

            <div class="category-tabs" id="category-tabs" style="display: flex; gap: 1rem; margin-bottom: 2rem; overflow-x: auto; padding-bottom: 1rem;">
                <!-- Categories will be loaded here -->
                <div style="grid-column: 1/-1; text-align: center; padding: 2rem;">
                    <i class="ri-loader-4-line ri-spin" style="font-size: 2rem; color: var(--primary-color);"></i>
                </div>
            </div>
            
            <div class="menu-grid" id="menu-grid">
                <!-- Items will be loaded via script.js -->
                <div style="grid-column: 1/-1; text-align: center; padding: 4rem;">
                    <i class="ri-loader-4-line ri-spin" style="font-size: 3rem; color: var(--primary-color);"></i>
                    <p>Loading your favorites...</p>
                </div>
            </div>
        </main>
    </div>

    <script src="/script.js"></script>
    <script>
        // Check Auth
        const userStr = localStorage.getItem('user');
        console.log("Checking Auth in menu.html. Found user:", userStr);
        try {
            const user = JSON.parse(userStr);
            // Allow both customer and admin to view the menu
            if (!user || (user.role !== 'customer' && user.role !== 'admin')) {
                console.error("Auth Guard Failed. User missing:", user);
                window.location.href = '/';
            }
        } catch (e) {
            console.error("Invalid JSON in localStorage for 'user'");
            localStorage.removeItem('user');
            window.location.href = '/';
        }

        function logout() {
            localStorage.removeItem('user');
            window.location.href = '/';
        }

        let allFoods = [];
        let allCategories = [];

        async function loadMenu() {
            try {
                // Fetch Categories
                const catRes = await fetch('/api/categories');
                allCategories = await catRes.json();
                renderCategories();

                // Fetch Foods
                const res = await fetch('/api/foods');
                allFoods = await res.json();
                renderMenu(allFoods);
            } catch (err) {
                console.error("Load menu error:", err);
                const grid = document.getElementById('menu-grid');
                grid.innerHTML = '<p style="text-align:center; padding: 2rem;">Failed to load items. Please try again.</p>';
            }
        }

        function renderCategories() {
            const container = document.getElementById('category-tabs');
            container.innerHTML = '<button onclick="filterByCategory(\'all\')" class="btn btn-primary cat-btn active">All Items</button>';
            
            allCategories.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = 'btn btn-text cat-btn';
                btn.innerText = cat.name;
                btn.onclick = () => filterByCategory(cat.name);
                container.appendChild(btn);
            });
        }

        function filterByCategory(category) {
            // Reset search input when category changes
            document.getElementById('menu-search').value = '';
            
            // Update UI
            const btns = document.querySelectorAll('.cat-btn');
            btns.forEach(btn => {
                if (btn.innerText === category || (category === 'all' && btn.innerText === 'All Items')) {
                    btn.className = 'btn btn-primary cat-btn active';
                } else {
                    btn.className = 'btn btn-text cat-btn';
                }
            });

            const filtered = category === 'all' ? allFoods : allFoods.filter(f => f.category === category);
            renderMenu(filtered);
        }

        function filterBySearch() {
            const query = document.getElementById('menu-search').value.toLowerCase().trim();
            
            // When searching, we search across all foods, regardless of category tab
            const filtered = allFoods.filter(f => 
                f.name.toLowerCase().includes(query) || 
                (f.description && f.description.toLowerCase().includes(query))
            );
            
            // Deactivate all category tabs while searching (except if search is empty)
            if (query !== '') {
                const btns = document.querySelectorAll('.cat-btn');
                btns.forEach(btn => {
                    btn.className = 'btn btn-text cat-btn';
                });
            } else {
                // If search is empty, go back to "All Items"
                filterByCategory('all');
                return;
            }

            renderMenu(filtered);
        }

        function renderMenu(foods) {
            const grid = document.getElementById('menu-grid');
            grid.innerHTML = '';
            
            if (foods.length === 0) {
                const query = document.getElementById('menu-search').value;
                grid.innerHTML = `
                    <div style="grid-column: 1/-1; text-align: center; padding: 6rem 2rem;">
                        <div style="background: #fff8f6; width: 80px; height: 80px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem;">
                            <i class="ri-search-eye-line" style="font-size: 2.5rem; color: var(--primary-color);"></i>
                        </div>
                        <h3 style="font-size: 1.5rem; font-weight: 700; color: var(--text-primary); margin-bottom: 0.5rem;">Oops! No dishes found</h3>
                        <p style="color: var(--text-secondary);">No results matching "${query}". Try searching for something else!</p>
                        <button onclick="document.getElementById('menu-search').value=''; filterByCategory('all');" class="btn btn-primary" style="margin-top: 1.5rem;">Clear Search</button>
                    </div>
                `;
                return;
            }

            foods.forEach(food => {
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => window.location.href = `/details.html?id=${food._id}`;
                
                card.innerHTML = `
                    <div class="card-img-container" style="height: 200px; overflow: hidden; border-radius: var(--radius-sm) var(--radius-sm) 0 0;">
                        <img src="${food.imageUrl}" class="card-img" style="width:100%; height:100%; object-fit:cover;" alt="${food.name}">
                    </div>
                    <div class="card-content">
                        <h3>${food.name}</h3>
                        <p style="color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 1rem; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;">${food.description || 'Delicious meal prepared fresh.'}</p>
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <span class="price">₹${food.price}</span>
                            <button class="btn btn-primary" onclick="event.stopPropagation(); addToCart('${food._id}', '${food.name}', ${food.price}, '${food.imageUrl}')">
                                <i class="ri-add-line"></i> Add
                            </button>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function addToCart(id, name, price, img) {
            App.Cart.add({ id, name, price, img });
            updateCartCount();
        }

        function updateCartCount() {
            App.Cart.updateUI();
        }

        loadMenu();
        updateCartCount();
    </script>
</body>
</html>

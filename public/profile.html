<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | Feastify</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#ff5a00',
                        dark: '#0a0a0b',
                        surface: '#121214',
                        border: '#1e1e21'
                    }
                }
            }
        }
    </script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; }
        .tracking-bar-step {
            position: relative;
            flex: 1;
            text-align: center;
        }
        .tracking-bar-step::after {
            content: '';
            position: absolute;
            top: 20px;
            left: 50%;
            width: 100%;
            height: 4px;
            background: #27272a;
            z-index: 0;
        }
        .tracking-bar-step:last-child::after { display: none; }
        .tracking-bar-step.active::after { background: var(--primary); }
        .step-icon {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: #1e1e21;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 10px;
            position: relative;
            z-index: 1;
            transition: all 0.3s ease;
            border: 2px solid #27272a;
        }
        .tracking-bar-step.active .step-icon {
            background: #ff5a00;
            border-color: #ff5a00;
            color: white;
            box-shadow: 0 0 20px rgba(255, 90, 0, 0.3);
        }
        .tracking-bar-step.completed .step-icon {
            background: #22c55e;
            border-color: #22c55e;
            color: white;
        }
        .tracking-bar-step.completed::after { background: #22c55e; }
    </style>
</head>
<body class="bg-dark text-gray-300 min-h-screen">
    <!-- Navbar -->
    <nav class="border-b border-border bg-dark/80 backdrop-blur-md sticky top-0 z-50 p-4">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <div class="logo text-2xl font-black text-primary italic tracking-tighter">Feastify</div>
            <div class="flex items-center gap-6">
                <a href="/menu.html" class="text-sm font-bold hover:text-primary transition-colors">Menu</a>
                <button onclick="App.logout()" class="text-xs font-black uppercase tracking-widest text-gray-500 hover:text-white transition-colors">Logout</button>
            </div>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto p-6 md:p-12">
        <!-- Profile Header -->
        <div class="flex flex-col md:flex-row items-center gap-8 mb-16">
            <div class="w-32 h-32 bg-primary/10 rounded-full flex items-center justify-center text-5xl text-primary font-black border-4 border-primary/20 shadow-2xl">
                <span id="user-initial">U</span>
            </div>
            <div class="text-center md:text-left">
                <h1 id="user-name" class="text-5xl font-black text-white tracking-tight mb-2">User Name</h1>
                <p id="user-email" class="text-gray-500 font-medium">user@example.com</p>
                <div class="flex gap-4 mt-6">
                    <div class="bg-surface px-4 py-2 rounded-xl border border-border text-xs font-bold uppercase tracking-widest flex items-center gap-2">
                        <i class="ri-medal-fill text-yellow-500"></i> Gold Member
                    </div>
                </div>
            </div>
        </div>

        <!-- Active Orders Section -->
        <section class="mb-16">
            <div class="flex items-center justify-between mb-8">
                <h2 class="text-2xl font-black text-white flex items-center gap-3">
                    <span class="w-2 h-8 bg-primary rounded-full"></span>
                    Active Orders
                </h2>
                <span id="active-count" class="bg-primary text-white text-[10px] font-black px-3 py-1 rounded-full uppercase">0 Orders</span>
            </div>
            
            <div id="active-orders-container" class="space-y-8">
                <!-- Active order cards with tracking bar will go here -->
                <div class="text-center py-20 bg-surface rounded-[2.5rem] border border-border border-dashed">
                    <i class="ri-EBike-2-line text-6xl text-gray-700 mb-4 inline-block"></i>
                    <p class="text-gray-500 font-medium">No orders currently on the way.</p>
                    <a href="/menu.html" class="inline-block mt-4 text-primary font-bold text-sm">Order something delicious &rarr;</a>
                </div>
            </div>
        </section>

        <!-- Order History Section -->
        <section>
            <div class="flex items-center justify-between mb-8">
                <h2 class="text-2xl font-black text-white flex items-center gap-3">
                    <span class="w-2 h-8 bg-gray-700 rounded-full"></span>
                    Order History
                </h2>
            </div>
            
            <div id="history-container" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- History items -->
            </div>
        </section>
    </main>

    <script src="/script.js"></script>
    <script>
        const user = App.checkAuth();
        if (user) {
            document.getElementById('user-name').innerText = user.name;
            document.getElementById('user-email').innerText = user.email;
            document.getElementById('user-initial').innerText = user.name.charAt(0).toUpperCase();
        }

        async function fetchOrders() {
            try {
                const res = await fetch(`${API_BASE_URL}/api/my-orders?email=${encodeURIComponent(user.email)}`);
                const orders = await res.json();
                renderUI(orders);
            } catch (err) {
                console.error("Fetch orders error:", err);
            }
        }

        function renderUI(orders) {
            const activeContainer = document.getElementById('active-orders-container');
            const historyContainer = document.getElementById('history-container');
            
            const activeOrders = orders.filter(o => !['Delivered', 'Cancelled'].includes(o.orderStatus));
            const historyOrders = orders.filter(o => ['Delivered', 'Cancelled'].includes(o.orderStatus));

            document.getElementById('active-count').innerText = `${activeOrders.length} Orders`;

            // Render Active
            if (activeOrders.length > 0) {
                activeContainer.innerHTML = activeOrders.map(order => renderActiveCard(order)).join('');
            }

            // Render History
            if (historyOrders.length > 0) {
                historyContainer.innerHTML = historyOrders.map(order => renderHistoryCard(order)).join('');
            } else {
                historyContainer.innerHTML = '<p class="text-gray-500 italic col-span-full">No previous orders found.</p>';
            }
        }

        function renderActiveCard(order) {
            const currentStep = App.getOrderStatusStep(order.orderStatus);
            const statusSteps = [
                { id: 0, label: 'Ordered', icon: 'ri-file-list-3-line' },
                { id: 1, label: 'Kitchen', icon: 'ri-restaurant-2-line' },
                { id: 2, label: 'On Way', icon: 'ri-EBike-2-line' },
                { id: 3, label: 'Delivered', icon: 'ri-home-heart-line' }
            ];

            return `
                <div class="bg-surface rounded-[2.5rem] border border-border p-8 shadow-2xl overflow-hidden relative">
                    <div class="flex justify-between items-start mb-10">
                        <div>
                            <span class="text-[10px] font-black text-primary uppercase tracking-widest block mb-1">In Progress</span>
                            <h3 class="text-xl font-bold text-white">Order #${order._id.slice(-6).toUpperCase()}</h3>
                            <p class="text-xs text-gray-500 mt-1">${App.formatDate(order.timestamp)}</p>
                        </div>
                        <div class="text-right">
                            <span class="text-2xl font-black text-white">₹${order.totalAmount.toFixed(2)}</span>
                            <p class="text-[10px] font-bold text-gray-500 uppercase tracking-tighter">${order.cartItems.length} Items</p>
                        </div>
                    </div>

                    <!-- Tracking Bar -->
                    <div class="flex justify-between items-center mb-6 px-4">
                        ${statusSteps.map(step => `
                            <div class="tracking-bar-step ${step.id <= currentStep ? 'active' : ''} ${step.id < currentStep ? 'completed' : ''}">
                                <div class="step-icon">
                                    <i class="${step.id < currentStep ? 'ri-check-line' : step.icon}"></i>
                                </div>
                                <span class="text-[10px] font-black uppercase tracking-tighter ${step.id <= currentStep ? 'text-primary' : 'text-gray-600'}">${step.label}</span>
                            </div>
                        `).join('')}
                    </div>

                    <div class="grid grid-cols-2 gap-4 py-6 border-y border-gray-800/50 my-6">
                        <div>
                            <div class="text-[9px] font-black text-gray-500 uppercase tracking-widest mb-1">Delivery Address</div>
                            <div class="text-[10px] text-gray-400 font-medium leading-relaxed">${order.customerDetails.address}</div>
                        </div>
                        <div class="text-right">
                            <div class="text-[9px] font-black text-gray-500 uppercase tracking-widest mb-1">Payment Method</div>
                            <div class="inline-block px-2 py-1 rounded bg-gray-800 text-gray-400 text-[9px] font-black ring-1 ring-border">${order.paymentMethod || 'COD'}</div>
                        </div>
                    </div>

                    <div class="mt-8 pt-8 border-t border-border flex justify-between items-center">
                        <div class="flex -space-x-3 overflow-hidden">
                            ${order.cartItems.slice(0, 3).map(item => `
                                <div class="inline-block h-8 w-8 rounded-full ring-2 ring-surface bg-border flex items-center justify-center text-[10px] font-bold text-primary">
                                    ${item.name.charAt(0)}
                                </div>
                            `).join('')}
                            ${order.cartItems.length > 3 ? `<div class="inline-block h-8 w-8 rounded-full ring-2 ring-surface bg-gray-800 flex items-center justify-center text-[8px] font-bold">+${order.cartItems.length - 3}</div>` : ''}
                        </div>
                        <button onclick="window.location.href='/my-orders.html'" class="text-xs font-bold text-gray-500 hover:text-white transition-colors underline underline-offset-4">View Details</button>
                    </div>
                </div>
            `;
        }

        function renderHistoryCard(order) {
            const isCancelled = order.orderStatus === 'Cancelled';
            return `
                <div class="bg-surface rounded-3xl border border-border p-6 flex flex-col justify-between hover:border-gray-700 transition-all group">
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <span class="text-[10px] font-black ${isCancelled ? 'text-red-500' : 'text-green-500'} uppercase tracking-widest block mb-1">${order.orderStatus}</span>
                            <h4 class="font-bold text-white group-hover:text-primary transition-colors">Order #${order._id.slice(-6).toUpperCase()}</h4>
                            <p class="text-[10px] text-gray-600 font-medium">${App.formatDate(order.timestamp)}</p>
                        </div>
                        <span class="font-black text-white">₹${order.totalAmount.toFixed(2)}</span>
                    </div>
                    <div class="text-[10px] text-gray-500 font-bold uppercase tracking-tight mb-3">
                        ${order.cartItems.slice(0, 2).map(i => i.name).join(', ')}${order.cartItems.length > 2 ? '...' : ''}
                    </div>
                    <div class="pt-3 border-t border-gray-800 flex justify-between items-center">
                        <span class="text-[9px] font-black text-gray-600 uppercase">${order.paymentMethod || 'COD'}</span>
                        <span class="text-[9px] text-gray-600 font-medium truncate max-w-[120px]">${order.customerDetails.address}</span>
                    </div>
                </div>
            `;
        }

        fetchOrders();
        // Live polling
        setInterval(fetchOrders, 10000);
    </script>
</body>
</html>

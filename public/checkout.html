<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | Feastify</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
    <style>
        .page { position: relative; opacity: 1; visibility: visible; transform: none; padding: 2rem; }
    </style>
</head>
<body>
    <div id="app">
        <header>
            <button onclick="window.location.href='/cart.html'" class="btn btn-text">
                <i class="ri-arrow-left-line"></i> Back to Cart
            </button>
            <h2>Checkout</h2>
            <div></div>
        </header>

        <main style="max-width: 600px; margin: 0 auto;">
            <div class="checkout-container">
                <div class="order-summary" id="order-summary">
                    <!-- Summary items will be injected here -->
                </div>

                <form id="checkout-form">
                    <div class="input-group">
                        <label for="full-name">Full Name</label>
                        <input type="text" id="full-name" required placeholder="John Doe">
                    </div>
                    <div class="input-group">
                        <label for="address">Delivery Address</label>
                        <textarea id="address" required placeholder="Street name, Apartment, City..."></textarea>
                    </div>
                    <div class="input-group">
                        <label for="phone">Phone Number</label>
                        <input type="tel" id="phone" required placeholder="+91 00000 00000">
                    </div>
                    <div style="margin: 2rem 0; padding: 1.5rem; background: rgba(255, 90, 0, 0.05); border-radius: var(--radius-sm); border-left: 4px solid var(--primary-color);">
                        <p style="font-weight: 600;">Total Amount: <span id="checkout-total" style="color: var(--primary-color);">₹0.00</span></p>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block btn-large">Proceed to Payment</button>
                </form>
            </div>
        </main>
    </div>

    <script src="/script.js"></script>
    <script>
        App.checkAuth();

        const cart = App.Cart.get();
        if (cart.length === 0) {
            window.location.href = '/menu.html';
        }

        function renderSummary() {
            const summary = document.getElementById('order-summary');
            const total = App.Cart.getTotal();
            
            summary.innerHTML = cart.slice(0, 3).map(item => `
                <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.8rem; padding: 0.5rem; background: #fff; border-radius: 8px; border: 1px solid #eee;">
                    <div style="display: flex; align-items: center; gap: 1rem;">
                        <img src="${item.img}" style="width: 40px; height: 40px; border-radius: 6px; object-fit: cover;">
                        <span style="font-weight: 600; font-size: 0.9rem;">${item.name}</span>
                    </div>
                    <span style="font-weight: 700; color: var(--primary-color);">${item.quantity || 1}x</span>
                </div>
            `).join('');

            if (cart.length > 3) {
                summary.innerHTML += `<p style="color: var(--text-secondary); font-size: 0.8rem; margin-top: 0.5rem; text-align: center;">+ ${cart.length - 3} more items in your cart</p>`;
            }
            
            document.getElementById('checkout-total').innerText = `₹${total.toFixed(2)}`;
        }

        document.getElementById('checkout-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const customerDetails = {
                name: document.getElementById('full-name').value,
                phone: document.getElementById('phone').value,
                address: document.getElementById('address').value
            };
            
            const orderData = {
                customerDetails: customerDetails,
                customerEmail: JSON.parse(localStorage.getItem('user')).email,
                userId: JSON.parse(localStorage.getItem('user')).userId,
                cartItems: cart,
                totalAmount: App.Cart.getTotal(),
                paymentMethod: 'Card' // Default
            };
            
            localStorage.setItem('pendingOrder', JSON.stringify(orderData));
            localStorage.setItem('customerDetails', JSON.stringify(customerDetails));
            window.location.href = '/payment.html';
        });

        renderSummary();
    </script>
</body>
</html>

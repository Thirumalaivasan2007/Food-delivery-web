<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment | Feastify</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { primary: '#ff5a00' } } } }
    </script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen p-4">
    <div id="payment-app" class="w-full max-w-md bg-white rounded-3xl shadow-2xl overflow-hidden">
        <div class="bg-gray-900 text-white p-6">
            <h1 class="text-xl font-bold">Secure Checkout</h1>
            <p class="text-sm text-gray-400 mt-1">Select your payment method</p>
        </div>

        <div class="p-6">
            <div class="mb-6 p-4 bg-orange-50 rounded-2xl border border-orange-100 flex justify-between items-center">
                <span class="font-bold text-gray-700">Total Amount</span>
                <span id="display-total" class="text-2xl font-black text-primary">₹0.00</span>
            </div>

            <!-- Payment Selectors -->
            <div class="space-y-4">
                <!-- UPI -->
                <div onclick="selectMethod('upi')" id="method-upi" class="method-card p-4 border border-gray-100 rounded-2xl flex flex-col gap-4 cursor-pointer transition-all hover:bg-gray-50">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 bg-blue-50 text-blue-500 rounded-xl flex items-center justify-center text-xl">
                            <i class="ri-smartphone-line"></i>
                        </div>
                        <h3 class="font-bold flex-1">UPI (GPay / PhonePe)</h3>
                        <i id="check-upi" class="ri-checkbox-blank-circle-line text-gray-200 text-xl"></i>
                    </div>
                    <div id="form-upi" class="hidden space-y-3 pt-3 border-t border-gray-100">
                        <div class="logo">Feastify</div>
                        <div class="flex gap-2">
                            <input type="text" id="upi-id" placeholder="username@bank" class="flex-1 bg-white border border-gray-200 rounded-xl px-4 py-3 text-sm focus:border-primary outline-none">
                            <button onclick="event.stopPropagation(); alert('UPI ID Verified!')" class="bg-gray-900 text-white text-xs px-4 rounded-xl font-bold">Verify</button>
                        </div>
                    </div>
                </div>

                <!-- Card -->
                <div onclick="selectMethod('card')" id="method-card" class="method-card p-4 border border-gray-100 rounded-2xl flex flex-col gap-4 cursor-pointer transition-all hover:bg-gray-50">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 bg-purple-50 text-purple-500 rounded-xl flex items-center justify-center text-xl">
                            <i class="ri-bank-card-line"></i>
                        </div>
                        <h3 class="font-bold flex-1">Credit / Debit Card</h3>
                        <i id="check-card" class="ri-checkbox-blank-circle-line text-gray-200 text-xl"></i>
                    </div>
                    <div id="form-card" class="hidden space-y-3 pt-3 border-t border-gray-100">
                        <input type="text" id="card-number" placeholder="Card Number" class="w-full bg-white border border-gray-200 rounded-xl px-4 py-3 text-sm focus:border-primary outline-none font-mono">
                        <div class="grid grid-cols-2 gap-3">
                            <input type="text" id="card-exp" placeholder="MM/YY" class="bg-white border border-gray-200 rounded-xl px-4 py-3 text-sm focus:border-primary outline-none">
                            <input type="password" id="card-cvv" placeholder="CVV" class="bg-white border border-gray-200 rounded-xl px-4 py-3 text-sm focus:border-primary outline-none">
                        </div>
                    </div>
                </div>

                <!-- Net Banking -->
                <div onclick="selectMethod('netbanking')" id="method-netbanking" class="method-card p-4 border border-gray-100 rounded-2xl flex flex-col gap-4 cursor-pointer transition-all hover:bg-gray-50">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 bg-teal-50 text-teal-500 rounded-xl flex items-center justify-center text-xl">
                            <i class="ri-bank-line"></i>
                        </div>
                        <h3 class="font-bold flex-1">Net Banking</h3>
                        <i id="check-netbanking" class="ri-checkbox-blank-circle-line text-gray-200 text-xl"></i>
                    </div>
                    <div id="form-netbanking" class="hidden pt-3 border-t border-gray-100">
                        <select id="bank-select" class="w-full bg-white border border-gray-200 rounded-xl px-4 py-3 text-sm focus:border-primary outline-none">
                            <option value="">Select your bank</option>
                            <option value="SBI">State Bank of India</option>
                            <option value="HDFC">HDFC Bank</option>
                            <option value="ICICI">ICICI Bank</option>
                            <option value="AXIS">Axis Bank</option>
                        </select>
                    </div>
                </div>

                <!-- COD -->
                <div onclick="selectMethod('cod')" id="method-cod" class="method-card p-4 border border-gray-100 rounded-2xl flex flex-col gap-4 cursor-pointer transition-all hover:bg-gray-50">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 bg-green-50 text-green-500 rounded-xl flex items-center justify-center text-xl">
                            <i class="ri-money-rupee-circle-line"></i>
                        </div>
                        <h3 class="font-bold flex-1">Cash on Delivery</h3>
                        <i id="check-cod" class="ri-checkbox-blank-circle-line text-gray-200 text-xl"></i>
                    </div>
                    <div id="form-cod" class="hidden pt-3 border-t border-gray-100 text-xs text-center font-bold text-green-600">
                        Pay in cash upon delivery at your doorstep.
                    </div>
                </div>
            </div>

            <button onclick="processOrder()" id="pay-btn" class="w-full bg-black text-white font-bold py-4 rounded-2xl mt-8 hover:bg-gray-800 transition-all">
                Select Method First
            </button>
        </div>
    </div>

    <!-- Processing -->
    <div id="overlay" class="fixed inset-0 bg-white/80 backdrop-blur-sm z-50 hidden flex flex-col items-center justify-center">
        <div class="w-12 h-12 border-4 border-primary border-t-transparent rounded-full animate-spin mb-4"></div>
        <h2 class="font-bold text-xl">Placing your order...</h2>
    </div>

    <script src="/script.js"></script>
    <script>
        App.checkAuth();
        let activeMethod = null;
        const pendingOrder = JSON.parse(localStorage.getItem('pendingOrder'));
        if (!pendingOrder) window.location.href = '/menu.html';

        document.getElementById('display-total').innerText = `₹${pendingOrder.totalAmount.toFixed(2)}`;

        function selectMethod(method) {
            activeMethod = method;
            
            // Clear selections
            document.querySelectorAll('.method-card').forEach(el => {
                el.classList.remove('border-primary', 'bg-orange-50/20');
                el.querySelector('i[id^="check-"]').className = 'ri-checkbox-blank-circle-line text-gray-200 text-xl';
                el.querySelector('div[id^="form-"]').classList.add('hidden');
            });

            // Highlight new
            const card = document.getElementById(`method-${method}`);
            card.classList.add('border-primary', 'bg-orange-50/20');
            document.getElementById(`check-${method}`).className = 'ri-checkbox-circle-fill text-primary text-xl';
            document.getElementById(`form-${method}`).classList.remove('hidden');

            // Update button
            const btn = document.getElementById('pay-btn');
            btn.innerText = (method === 'cod') ? 'Confirm Order' : `Pay ₹${pendingOrder.totalAmount.toFixed(2)}`;
            btn.classList.add('bg-primary');
            btn.classList.remove('bg-black');
        }

        async function processOrder() {
            if (!activeMethod) return alert('Select payment method');

            let paymentDetails = activeMethod.toUpperCase();
            if (activeMethod === 'upi') {
                const id = document.getElementById('upi-id').value;
                if (!id) return alert('Enter UPI ID');
                paymentDetails = `UPI (${id})`;
            } else if (activeMethod === 'card') {
                const num = document.getElementById('card-number').value;
                if (!num) return alert('Enter Card Number');
                paymentDetails = `CARD (**** ${num.slice(-4)})`;
            } else if (activeMethod === 'netbanking') {
                const bank = document.getElementById('bank-select').value;
                if (!bank) return alert('Select your bank');
                paymentDetails = `Net Banking (${bank})`;
            }

            const overlay = document.getElementById('overlay');
            overlay.classList.remove('hidden');

            const customerDetails = JSON.parse(localStorage.getItem('customerDetails'));
            if (!customerDetails || !customerDetails.name || !customerDetails.phone || !customerDetails.address) {
                alert('Delivery details missing! Please fill them out.');
                window.location.href = '/checkout.html';
                return;
            }

            try {
                const user = JSON.parse(localStorage.getItem('user'));
                
                // Sanitize quantities: Ensure every item has a quantity (default 1)
                const sanitizedItems = (pendingOrder.cartItems || []).map(item => ({
                    ...item,
                    quantity: item.quantity || 1
                }));

                const finalOrder = {
                    ...pendingOrder,
                    cartItems: sanitizedItems,
                    customerDetails: customerDetails,
                    customerEmail: user.email,
                    paymentMethod: activeMethod.toUpperCase(),
                    paymentStatus: (activeMethod === 'cod') ? 'Pending (COD)' : 'Paid',
                    paymentDetails: paymentDetails
                };

                const res = await App.createOrder(finalOrder);
                if (res.success) {
                    App.Cart.clear();
                    localStorage.removeItem('pendingOrder');
                    setTimeout(() => {
                        window.location.href = `/order-success.html?id=${res.orderId}`;
                    }, 1500);
                } else {
                    overlay.classList.add('hidden');
                    alert('Order failed: ' + res.message);
                }
            } catch (err) {
                overlay.classList.add('hidden');
                console.error(err);
                alert('Connection error');
            }
        }
    </script>
</body>
</html>

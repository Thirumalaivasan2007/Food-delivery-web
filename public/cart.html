<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart | Feastify</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
    <style>
        .page { position: relative; opacity: 1; visibility: visible; transform: none; padding: 2rem; }
        .cart-item {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            background: var(--surface-color);
            padding: 1.5rem;
            border-radius: var(--radius-md);
            margin-bottom: 1rem;
            border: 1px solid var(--border-color);
        }
        .cart-item img {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: var(--radius-sm);
        }
        .cart-item-info { flex: 1; }
        .cart-summary {
            background: var(--surface-color);
            padding: 2rem;
            border-radius: var(--radius-md);
            border: 1px solid var(--border-color);
            margin-top: 2rem;
        }
    </style>
</head>
<body>
    <div id="app">
        <header>
            <button onclick="window.location.href='/menu.html'" class="btn btn-text">
                <i class="ri-arrow-left-line"></i> Back to Menu
            </button>
            <h2>My Cart</h2>
            <div></div>
        </header>

        <main style="max-width: 800px; margin: 0 auto;">
            <div id="cart-list">
                <!-- Cart items will be loaded here -->
            </div>

            <!-- Recommendation Section -->
            <div id="recommendations-container" style="display: none; margin-top: 3rem;">
                <h3 style="font-size: 1.1rem; font-weight: 800; color: #fff; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.5rem;">
                    <i class="ri-sparkling-2-line text-primary"></i> Frequently Bought Together
                </h3>
                <div id="recommendations-list" style="display: flex; gap: 1.5rem; overflow-x: auto; padding-bottom: 1rem; scroll-behavior: smooth; -ms-overflow-style: none; scrollbar-width: none;">
                    <!-- Recommendations injected here -->
                </div>
            </div>

            <div id="empty-cart" style="display: none; text-align: center; padding: 4rem;">
                <i class="ri-shopping-bag-line" style="font-size: 4rem; color: var(--border-color);"></i>
                <h3>Your cart is empty</h3>
                <p style="color: var(--text-secondary); margin-bottom: 2rem;">Add some delicious items to get started!</p>
                <button onclick="window.location.href='/menu.html'" class="btn btn-primary">Go to Menu</button>
            </div>

            <div id="cart-footer" class="cart-summary" style="display: none;">
                <div style="display: flex; justify-content: space-between; margin-bottom: 1rem;">
                    <span>Subtotal</span>
                    <span id="subtotal">₹0.00</span>
                </div>
                <div style="display: flex; justify-content: space-between; margin-bottom: 2rem; font-weight: 700; font-size: 1.25rem;">
                    <span>Total</span>
                    <span id="total">₹0.00</span>
                </div>
                <button onclick="window.location.href='/checkout.html'" class="btn btn-primary btn-block btn-large">Proceed to Checkout</button>
            </div>
        </main>
    </div>

    <script src="/script.js"></script>
    <script>
        App.checkAuth();

        async function renderCart() {
            const cart = App.Cart.get();
            const list = document.getElementById('cart-list');
            const footer = document.getElementById('cart-footer');
            const empty = document.getElementById('empty-cart');
            const recContainer = document.getElementById('recommendations-container');
            
            list.innerHTML = '';
            
            if (cart.length === 0) {
                empty.style.display = 'block';
                footer.style.display = 'none';
                recContainer.style.display = 'none';
                return;
            }

            empty.style.display = 'none';
            footer.style.display = 'block';

            cart.forEach((item, index) => {
                const itemTotal = (item.price * (item.quantity || 1)).toFixed(2);
                const div = document.createElement('div');
                div.className = 'cart-item';
                div.innerHTML = `
                    <div style="position: relative;">
                        <img src="${item.img}" alt="${item.name}">
                        <div style="position: absolute; top: -10px; right: -10px; background: var(--primary-color); color: white; width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 700; border: 2px solid var(--surface-color);">${item.quantity || 1}</div>
                    </div>
                    <div class="cart-item-info">
                        <h3>${item.name}</h3>
                        <p class="price" style="color: var(--primary-color); font-weight: 600;">${item.quantity || 1} x ₹${item.price.toFixed(2)} = ₹${itemTotal}</p>
                    </div>
                    <button onclick="removeItem(${index})" class="btn btn-text" style="color: #ff4444;">
                        <i class="ri-delete-bin-line"></i>
                    </button>
                `;
                list.appendChild(div);
            });

            const total = App.Cart.getTotal();
            document.getElementById('subtotal').innerText = `₹${total.toFixed(2)}`;
            document.getElementById('total').innerText = `₹${total.toFixed(2)}`;

            await renderRecommendations(cart);
        }

        async function renderRecommendations(cart) {
            const recList = document.getElementById('recommendations-list');
            const recContainer = document.getElementById('recommendations-container');
            
            const recommendations = await App.getRecommendations(cart);
            
            if (recommendations.length === 0) {
                recContainer.style.display = 'none';
                return;
            }

            recContainer.style.display = 'block';
            recList.innerHTML = recommendations.map(item => `
                <div class="menu-card" style="min-width: 220px; flex: 0 0 auto; background: var(--surface-color); border: 1px solid var(--border-color); border-radius: var(--radius-md); overflow: hidden;">
                    <img src="${item.img}" style="width: 100%; height: 120px; object-fit: cover;">
                    <div style="padding: 1rem;">
                        <h4 style="font-size: 0.9rem; font-weight: 700; margin-bottom: 0.25rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${item.name}</h4>
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 0.5rem;">
                            <span style="color: var(--primary-color); font-weight: 700; font-size: 0.9rem;">₹${item.price.toFixed(2)}</span>
                            <button onclick='quickAdd(${JSON.stringify(item).replace(/'/g, "&apos;")})' class="btn btn-primary" style="padding: 0.4rem 0.8rem; font-size: 0.75rem; border-radius: 8px;">
                                <i class="ri-add-line"></i> Add
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function quickAdd(item) {
            App.Cart.add({
                id: item._id,
                name: item.name,
                price: item.price,
                img: item.img
            });
            renderCart();
        }

        function removeItem(index) {
            App.Cart.remove(index);
            renderCart();
        }

        renderCart();
    </script>
</body>
</html>
